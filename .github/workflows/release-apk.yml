# Publica el APK de Admin en GitHub Releases al pushear un tag v* (ej. v1.0.0).
# Requiere: Settings → Actions → General → Workflow permissions → Read and write.

name: Release Admin APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Stage APK for release
        shell: bash
        run: |
          set -euo pipefail
          out="app/build/outputs/apk/release"
          if [[ ! -d "$out" ]]; then
            echo "Expected output directory missing: $out"
            find app/build/outputs -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          apk=$(find "$out" -maxdepth 1 -name '*.apk' | head -1)
          if [[ -z "$apk" ]]; then
            echo "No APK in $out"
            exit 1
          fi
          echo "Using: $apk"
          cp "$apk" "livria-admin-${{ github.ref_name }}.apk"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: livria-admin-${{ github.ref_name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
